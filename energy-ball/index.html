<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>掌心能量球 v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
video{display:none}
#loading{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:#000;color:#6af;font-family:sans-serif;font-size:18px;
  transition:opacity .6s;
}
#loading.fade{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(100,170,255,.15);
  border-top-color:#6af;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#status{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(100,170,255,.5);font:12px monospace;z-index:5;pointer-events:none;
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span id="loadMsg">正在加载手部追踪模型…</span></div>
<canvas id="c"></canvas>
<video id="v" playsinline></video>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script>
(()=>{
'use strict';

const DPR=window.devicePixelRatio||1;

// ============ CONFIG ============
const SMOOTH       = 0.6;
const FORM_DIST    = 250*DPR;
const MIN_R        = 50*DPR;
const MAX_R        = 350*DPR;
const R_SCALE      = 0.7;
const HOLD_ABOVE   = 0.6;
const GRACE_MS     = 400;
const FADE_IN      = 0.035;
const FADE_OUT     = 0.012;

// Particle counts — lots of tiny dots
const CORE_N   = 200;
const MID_N    = 250;
const OUTER_N  = 150;
const WISP_N   = 40;  // stray wisps outside the sphere

// ============ STATE ============
const S={IDLE:0,FORM:1,GROW:2,HOLD:3};
let state=S.IDLE;

let bx=0,by=0,br=MIN_R,bAlpha=0;
let tx=0,ty=0,tr=MIN_R;
let holdR=MIN_R;

// Smoothed hands
let sAnchor=null; // right hand (screen left) = anchor
let sControl=null; // left hand (screen right) = size control
let lastTwo=0;

// ============ PARTICLES ============
function makeParticle(layer){
  // layer 0=core, 1=mid, 2=outer, 3=wisp
  let rBand, szBase, alpha;
  if(layer===0){
    rBand=Math.random()*0.3;
    szBase=0.6+Math.random()*1.0;
    alpha=0.6+Math.random()*0.4;
  }else if(layer===1){
    rBand=0.2+Math.random()*0.55;
    szBase=0.5+Math.random()*1.2;
    alpha=0.3+Math.random()*0.5;
  }else if(layer===2){
    rBand=0.6+Math.random()*0.4;
    szBase=0.4+Math.random()*1.0;
    alpha=0.15+Math.random()*0.35;
  }else{
    rBand=0.9+Math.random()*0.5;
    szBase=0.3+Math.random()*0.7;
    alpha=0.08+Math.random()*0.15;
  }
  return{
    layer,
    rBand,
    th:Math.random()*Math.PI*2,
    ph:(Math.random()-0.5)*Math.PI,
    spd:(0.2+Math.random()*0.8)*(layer===0?1.8:layer===1?1.0:layer===2?0.5:0.3),
    espd:0.1+Math.random()*0.3,
    sz:szBase*DPR,
    a:alpha,
    ps:Math.random()*Math.PI*2,
    drift:Math.random()*0.25
  };
}

let pts=[];
function initParticles(){
  pts=[];
  for(let i=0;i<CORE_N;i++) pts.push(makeParticle(0));
  for(let i=0;i<MID_N;i++) pts.push(makeParticle(1));
  for(let i=0;i<OUTER_N;i++) pts.push(makeParticle(2));
  for(let i=0;i<WISP_N;i++) pts.push(makeParticle(3));
}
initParticles();

// ============ CANVAS ============
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const vid=document.getElementById('v');
const statusEl=document.getElementById('status');

function resize(){
  canvas.width=window.innerWidth*DPR;
  canvas.height=window.innerHeight*DPR;
}
window.addEventListener('resize',resize);
resize();

function coverRect(vw,vh){
  const cw=canvas.width,ch=canvas.height;
  const va=vw/vh,ca=cw/ch;
  if(ca>va){const dw=cw,dh=cw/va;return{dx:0,dy:(ch-dh)/2,dw,dh}}
  const dh=ch,dw=ch*va;return{dx:(cw-dw)/2,dy:0,dw,dh}
}

function lm2c(lm,dr){
  return{x:dr.dx+dr.dw*(1-lm.x), y:dr.dy+dr.dh*lm.y}
}

function palm(lms,dr){
  const ids=[0,5,9,13,17];
  let sx=0,sy=0;
  for(const i of ids){const p=lm2c(lms[i],dr);sx+=p.x;sy+=p.y}
  return{x:sx/5,y:sy/5}
}

function sm(prev,cur,f){
  if(!prev)return{...cur};
  return{x:prev.x*f+cur.x*(1-f), y:prev.y*f+cur.y*(1-f)}
}

// ============ PROCESS ============
function processHands(results){
  const hands=results.multiHandLandmarks||[];
  if(!vid.videoWidth)return;
  const dr=coverRect(vid.videoWidth,vid.videoHeight);
  const now=performance.now();

  const names=['IDLE','FORM','GROW','HOLD'];
  statusEl.textContent=names[state]+' | hands:'+hands.length+' | r:'+Math.round(br/DPR);

  if(hands.length>=2){
    const p0=palm(hands[0],dr), p1=palm(hands[1],dr);
    // Screen-left = user's right hand = anchor
    const[anchor,control]=p0.x<p1.x?[p0,p1]:[p1,p0];

    sAnchor=sm(sAnchor,anchor,SMOOTH);
    sControl=sm(sControl,control,SMOOTH);
    lastTwo=now;

    const dist=Math.hypot(sControl.x-sAnchor.x,sControl.y-sAnchor.y);

    if(state===S.IDLE){
      if(dist<FORM_DIST){
        state=S.FORM;
        bx=sAnchor.x;by=sAnchor.y;br=MIN_R;
      }
    }

    if(state===S.FORM){
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
      tr=MIN_R;
      bAlpha=Math.min(1,bAlpha+FADE_IN);
      if(bAlpha>=0.9) state=S.GROW;
    }

    if(state===S.GROW||state===S.HOLD){
      state=S.GROW;
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
      tr=Math.max(MIN_R,Math.min(MAX_R,dist*R_SCALE));
      bAlpha=Math.min(1,bAlpha+FADE_IN);
    }

  }else if(hands.length===1){
    const p=palm(hands[0],dr);
    // This remaining hand is the anchor (right hand)
    sAnchor=sm(sAnchor,p,SMOOTH);

    if((state===S.GROW)&&(now-lastTwo)>GRACE_MS){
      holdR=br; // lock current size
      state=S.HOLD;
    }

    if(state===S.HOLD){
      tx=sAnchor.x;
      ty=sAnchor.y-holdR*HOLD_ABOVE;
      tr=holdR;
      bAlpha=1;
      // gentle breathing
      const breath=Math.sin(now/1000*2)*0.03;
      tr=holdR*(1+breath);
    }

    if(state===S.FORM){
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
    }

  }else{
    if(state!==S.IDLE){
      bAlpha-=FADE_OUT;
      if(bAlpha<=0){bAlpha=0;state=S.IDLE;sAnchor=null;sControl=null;}
    }
  }

  const ps=0.5;
  bx=bx*ps+tx*(1-ps);
  by=by*ps+ty*(1-ps);
  br=br*0.8+tr*0.2;
}

// ============ DRAW ============
function draw(results){
  const cw=canvas.width,ch=canvas.height;
  ctx.clearRect(0,0,cw,ch);

  const img=results.image||vid;
  if(vid.videoWidth){
    const dr=coverRect(vid.videoWidth,vid.videoHeight);
    ctx.save();
    ctx.translate(cw,0);
    ctx.scale(-1,1);
    ctx.drawImage(img,dr.dx,dr.dy,dr.dw,dr.dh);
    ctx.restore();
  }

  if(state!==S.IDLE&&bAlpha>0.01){
    drawBall(performance.now()/1000);
  }
}

function drawBall(t){
  ctx.save();

  // === LAYER 1: Outer halo glow (large soft radial gradient) ===
  const haloR=br*1.6;
  const halo=ctx.createRadialGradient(bx,by,br*0.1,bx,by,haloR);
  halo.addColorStop(0,`rgba(80,160,255,${0.12*bAlpha})`);
  halo.addColorStop(0.4,`rgba(40,100,220,${0.06*bAlpha})`);
  halo.addColorStop(1,'rgba(20,60,180,0)');
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=halo;
  ctx.fillRect(bx-haloR,by-haloR,haloR*2,haloR*2);

  // === LAYER 2: Main sphere body (tight gradient — gives cohesion) ===
  const bodyR=br*0.95;
  const body=ctx.createRadialGradient(bx,by,0,bx,by,bodyR);
  body.addColorStop(0,`rgba(220,240,255,${0.5*bAlpha})`);
  body.addColorStop(0.15,`rgba(160,210,255,${0.4*bAlpha})`);
  body.addColorStop(0.5,`rgba(60,140,255,${0.25*bAlpha})`);
  body.addColorStop(0.8,`rgba(30,80,220,${0.1*bAlpha})`);
  body.addColorStop(1,'rgba(15,40,160,0)');
  ctx.fillStyle=body;
  ctx.beginPath();
  ctx.arc(bx,by,bodyR,0,Math.PI*2);
  ctx.fill();

  // === LAYER 3: Bright core ===
  const coreR=br*0.25;
  const core=ctx.createRadialGradient(bx,by,0,bx,by,coreR);
  core.addColorStop(0,`rgba(255,255,255,${0.8*bAlpha})`);
  core.addColorStop(0.3,`rgba(200,230,255,${0.5*bAlpha})`);
  core.addColorStop(1,'rgba(100,180,255,0)');
  ctx.fillStyle=core;
  ctx.beginPath();
  ctx.arc(bx,by,coreR,0,Math.PI*2);
  ctx.fill();

  // === LAYER 4: Particles (additive, no shadowBlur) ===
  for(const p of pts){
    const theta=p.th+t*p.spd;
    const phi=p.ph+Math.sin(t*p.espd+p.ps)*0.35+Math.sin(t*0.3+p.ps*2)*p.drift;
    const ct=Math.cos(theta),st=Math.sin(theta);
    const cp=Math.cos(phi),sp=Math.sin(phi);
    const pulse=0.85+0.15*Math.sin(t*0.8+p.ps);
    const r=br*p.rBand*pulse;
    const px=bx+ct*cp*r;
    const py=by+sp*r*0.7+st*cp*r*0.3;
    const depth=(ct*cp+1)/2;
    const depthAlpha=0.25+0.75*depth;
    const alpha=p.a*depthAlpha*bAlpha;
    if(alpha<0.01)continue;

    const sz=p.sz*(0.6+0.4*depth)*(br/MIN_R*0.25+0.75);
    const finalSz=Math.max(0.5*DPR,Math.min(sz,3*DPR));

    let cr,cg,cb;
    if(p.layer===0){
      cr=220+Math.round(35*depth);
      cg=235+Math.round(20*depth);
      cb=255;
    }else if(p.layer===1){
      cr=80+Math.round(80*depth);
      cg=150+Math.round(60*depth);
      cb=255;
    }else{
      cr=25+Math.round(50*depth);
      cg=70+Math.round(70*depth);
      cb=180+Math.round(75*depth);
    }

    ctx.globalAlpha=alpha;
    ctx.fillStyle=`rgb(${cr},${cg},${cb})`;
    ctx.beginPath();
    ctx.arc(px,py,finalSz,0,Math.PI*2);
    ctx.fill();
  }

  // === LAYER 5: Shimmer sparks (a few bright flashes) ===
  const sparkCount=8;
  for(let i=0;i<sparkCount;i++){
    const angle=t*1.2+i*Math.PI*2/sparkCount;
    const rr=br*0.6*(0.5+0.5*Math.sin(t*2.5+i*1.3));
    const sx=bx+Math.cos(angle)*rr;
    const sy=by+Math.sin(angle)*rr*0.7;
    const flash=Math.max(0,Math.sin(t*4+i*2.1));
    const sa=flash*0.6*bAlpha;
    if(sa<0.02)continue;
    ctx.globalAlpha=sa;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(sx,sy,1.5*DPR,0,Math.PI*2);
    ctx.fill();
  }

  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;

  // Energy arcs between hands during GROW
  if(state===S.GROW&&sAnchor&&sControl){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.lineWidth=1.5*DPR;
    for(let i=0;i<5;i++){
      const w=Math.sin(t*3.5+i*1.4)*20*DPR;
      const a=bAlpha*0.12;
      ctx.globalAlpha=a;
      ctx.strokeStyle=`rgba(100,180,255,${a})`;
      ctx.beginPath();
      ctx.moveTo(sAnchor.x,sAnchor.y);
      ctx.quadraticCurveTo((sAnchor.x+sControl.x)/2,
        (sAnchor.y+sControl.y)/2+w,
        sControl.x,sControl.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();
}

// ============ INIT ============
async function main(){
  const hands=new Hands({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });
  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.5
  });
  hands.onResults(r=>{processHands(r);draw(r)});

  const camera=new Camera(vid,{
    onFrame:async()=>await hands.send({image:vid}),
    width:1280,height:720
  });
  await camera.start();

  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.style.display='none',700);
}

main().catch(err=>{
  document.getElementById('loadMsg').textContent='加载失败: '+err.message;
  console.error(err);
});

})();
</script>
</body>
</html>
