<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>掌心能量球</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
video{display:none}
#loading{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:#000;color:#6af;font-family:sans-serif;font-size:18px;
  transition:opacity .6s;
}
#loading.fade{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(100,170,255,.15);
  border-top-color:#6af;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#status{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(100,170,255,.5);font:12px monospace;z-index:5;pointer-events:none;
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span id="loadMsg">正在加载手部追踪模型…</span></div>
<canvas id="c"></canvas>
<video id="v" playsinline></video>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script>
(()=>{
'use strict';

// ============ CONFIG ============
const DPR_=window.devicePixelRatio||1;
const SMOOTH       = 0.6;
const FORM_DIST    = 250*DPR_;
const MIN_R        = 45*DPR_;
const MAX_R        = 220*DPR_;
const R_SCALE      = 0.55;
const XFER_SPEED   = 0.055;
const HOLD_ABOVE   = 1.4;
const P_COUNT      = 80;
const GRACE_MS     = 350;
const FADE_IN      = 0.04;
const FADE_OUT     = 0.015;

// ============ STATE ============
const S={IDLE:0,FORM:1,GROW:2,XFER:3,HOLD:4};
let state=S.IDLE;

let bx=0,by=0,br=MIN_R,bAlpha=0;
let tx=0,ty=0,tr=MIN_R;

let xfX=0,xfY=0,xfT=0;

let sL=null,sR=null;
let sPalm={x:0,y:0};
let lastTwo=0, lastOne=0;

const DPR=window.devicePixelRatio||1;

// Particles
const pts=Array.from({length:P_COUNT},()=>({
  th:Math.random()*Math.PI*2,
  ph:Math.random()*Math.PI-Math.PI/2,
  spd:0.4+Math.random()*1.2,
  espd:0.2+Math.random()*0.4,
  sz:(1+Math.random()*2.5)*DPR,
  a:0.3+Math.random()*0.7,
  ps:Math.random()*Math.PI*2
}));

// ============ CANVAS ============
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const vid=document.getElementById('v');
const statusEl=document.getElementById('status');

function resize(){
  canvas.width=window.innerWidth*DPR;
  canvas.height=window.innerHeight*DPR;
}
window.addEventListener('resize',resize);
resize();

function coverRect(vw,vh){
  const cw=canvas.width,ch=canvas.height;
  const va=vw/vh,ca=cw/ch;
  if(ca>va){const dw=cw,dh=cw/va;return{dx:0,dy:(ch-dh)/2,dw,dh}}
  const dh=ch,dw=ch*va;return{dx:(cw-dw)/2,dy:0,dw,dh}
}

function lm2c(lm,dr){
  return{x:dr.dx+dr.dw*(1-lm.x), y:dr.dy+dr.dh*lm.y}
}

function palm(lms,dr){
  const ids=[0,5,9,13,17];
  let sx=0,sy=0;
  for(const i of ids){const p=lm2c(lms[i],dr);sx+=p.x;sy+=p.y}
  return{x:sx/5,y:sy/5}
}

function sm(prev,cur,f){
  if(!prev)return{...cur};
  return{x:prev.x*f+cur.x*(1-f), y:prev.y*f+cur.y*(1-f)}
}

function easeOut(t){return 1-(1-t)**3}

// ============ PROCESS ============
function processHands(results){
  const hands=results.multiHandLandmarks||[];
  if(!vid.videoWidth)return;
  const dr=coverRect(vid.videoWidth,vid.videoHeight);
  const now=performance.now();

  const stateNames=['IDLE','FORM','GROW','XFER','HOLD'];
  statusEl.textContent=stateNames[state]+' | hands:'+hands.length+' | r:'+Math.round(br/DPR);

  if(hands.length>=2){
    const p0=palm(hands[0],dr), p1=palm(hands[1],dr);
    const[left,right]=p0.x<p1.x?[p0,p1]:[p1,p0];

    sL=sm(sL,left,SMOOTH);
    sR=sm(sR,right,SMOOTH);
    lastTwo=now;

    const dist=Math.hypot(sR.x-sL.x,sR.y-sL.y);
    const mid={x:(sL.x+sR.x)/2, y:(sL.y+sR.y)/2};

    if(state===S.IDLE){
      if(dist<FORM_DIST){
        state=S.FORM;
        bx=mid.x;by=mid.y;br=MIN_R;
      }
    }

    if(state===S.FORM){
      tx=mid.x;ty=mid.y;tr=MIN_R;
      bAlpha=Math.min(1,bAlpha+FADE_IN);
      if(bAlpha>=0.95)state=S.GROW;
    }

    if(state===S.GROW||state===S.XFER||state===S.HOLD){
      state=S.GROW;
      tx=mid.x;ty=mid.y;
      tr=Math.max(MIN_R,Math.min(MAX_R,dist*R_SCALE));
      bAlpha=Math.min(1,bAlpha+FADE_IN);
    }

  }else if(hands.length===1){
    const p=palm(hands[0],dr);
    sPalm=sm(sPalm.x?sPalm:p, p, SMOOTH);
    lastOne=now;

    if(state===S.GROW&&(now-lastTwo)>GRACE_MS){
      xfX=bx;xfY=by;xfT=0;
      state=S.XFER;
    }

    if(state===S.XFER){
      xfT=Math.min(1,xfT+XFER_SPEED);
      const e=easeOut(xfT);
      tx=xfX+(sPalm.x-xfX)*e;
      ty=xfY+(sPalm.y-br*HOLD_ABOVE-xfY)*e;
      tr=Math.max(MIN_R,tr-(tr-MIN_R)*0.02);
      if(xfT>=1)state=S.HOLD;
    }

    if(state===S.HOLD){
      const t=performance.now()/1000;
      tx=sPalm.x;
      ty=sPalm.y-br*HOLD_ABOVE+Math.sin(t*1.8)*4*DPR;
      bAlpha=1;
    }

    if(state===S.FORM){
      tx=sPalm.x;ty=sPalm.y;
    }

  }else{
    if(state!==S.IDLE){
      bAlpha-=FADE_OUT;
      if(bAlpha<=0){bAlpha=0;state=S.IDLE;sL=null;sR=null;}
    }
  }

  const ps=state===S.XFER?0.4:0.55;
  bx=bx*ps+tx*(1-ps);
  by=by*ps+ty*(1-ps);
  br=br*0.75+tr*0.25;
}

// ============ DRAW ============
function draw(results){
  const cw=canvas.width,ch=canvas.height;
  ctx.clearRect(0,0,cw,ch);

  const img=results.image||vid;
  if(vid.videoWidth){
    const dr=coverRect(vid.videoWidth,vid.videoHeight);
    ctx.save();
    ctx.translate(cw,0);
    ctx.scale(-1,1);
    ctx.drawImage(img,dr.dx,dr.dy,dr.dw,dr.dh);
    ctx.restore();
  }

  if(state!==S.IDLE&&bAlpha>0.01){
    drawBall(performance.now()/1000);
  }
}

function drawBall(t){
  ctx.save();

  // Outer glow
  ctx.globalAlpha=bAlpha*0.55;
  const og=ctx.createRadialGradient(bx,by,br*0.2,bx,by,br*2.5);
  og.addColorStop(0,'rgba(70,150,255,0.4)');
  og.addColorStop(0.4,'rgba(40,110,240,0.15)');
  og.addColorStop(1,'rgba(20,60,200,0)');
  ctx.fillStyle=og;
  ctx.beginPath();
  ctx.arc(bx,by,br*2.5,0,Math.PI*2);
  ctx.fill();

  // Sphere body with 3D shading
  ctx.globalAlpha=bAlpha*0.85;
  const hlx=bx-br*0.25,hly=by-br*0.25;
  const sg=ctx.createRadialGradient(hlx,hly,br*0.05,bx,by,br);
  sg.addColorStop(0,'rgba(185,220,255,0.75)');
  sg.addColorStop(0.2,'rgba(100,175,255,0.6)');
  sg.addColorStop(0.55,'rgba(45,125,235,0.35)');
  sg.addColorStop(1,'rgba(20,70,200,0.06)');
  ctx.fillStyle=sg;
  ctx.beginPath();
  ctx.arc(bx,by,br,0,Math.PI*2);
  ctx.fill();

  // White core
  const cr=br*0.18;
  ctx.globalAlpha=bAlpha;
  ctx.shadowColor='rgba(210,235,255,0.95)';
  ctx.shadowBlur=cr*4;
  const cg=ctx.createRadialGradient(bx,by,0,bx,by,cr*1.8);
  cg.addColorStop(0,'rgba(255,255,255,1)');
  cg.addColorStop(0.35,'rgba(225,242,255,0.9)');
  cg.addColorStop(1,'rgba(120,190,255,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.arc(bx,by,cr*1.8,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // Orbiting particles
  for(const p of pts){
    const theta=p.th+t*p.spd;
    const phi=p.ph+Math.sin(t*p.espd+p.ps)*0.4;
    const r=br*(0.7+0.3*Math.sin(t*0.7+p.ps));

    const ct=Math.cos(theta),st=Math.sin(theta);
    const cp=Math.cos(phi),sp=Math.sin(phi);
    const px=bx+ct*cp*r;
    const py=by+sp*r*0.65+st*cp*r*0.35;
    const depth=ct*cp;

    const a=p.a*(0.35+0.65*Math.max(0,depth))*bAlpha;
    const sz=p.sz*(0.55+0.45*depth);
    if(a<0.02)continue;

    ctx.globalAlpha=a;
    ctx.shadowColor='rgba(130,200,255,0.5)';
    ctx.shadowBlur=sz*2.5;
    ctx.fillStyle=depth>0?
      `rgba(195,225,255,${a})`:`rgba(60,130,255,${a*0.35})`;
    ctx.beginPath();
    ctx.arc(px,py,Math.max(0.5,sz),0,Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur=0;

  // Energy arcs between palms during GROW
  if(state===S.GROW&&sL&&sR){
    ctx.lineWidth=1.5*DPR;
    ctx.shadowColor='rgba(100,180,255,0.3)';
    ctx.shadowBlur=8*DPR;
    for(let i=0;i<3;i++){
      const w=Math.sin(t*3+i*2.1)*22*DPR;
      ctx.globalAlpha=bAlpha*0.2;
      ctx.strokeStyle='rgba(110,185,255,0.5)';
      ctx.beginPath();
      ctx.moveTo(sL.x,sL.y);
      ctx.quadraticCurveTo(bx,by+w,sR.x,sR.y);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  }

  // Breathing pulse in HOLD
  if(state===S.HOLD){
    const pulse=0.5+0.5*Math.sin(t*2.5);
    ctx.globalAlpha=bAlpha*pulse*0.15;
    const pg=ctx.createRadialGradient(bx,by,br*0.5,bx,by,br*1.8);
    pg.addColorStop(0,'rgba(130,200,255,0.3)');
    pg.addColorStop(1,'rgba(60,140,255,0)');
    ctx.fillStyle=pg;
    ctx.beginPath();
    ctx.arc(bx,by,br*1.8,0,Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// ============ INIT ============
async function main(){
  const hands=new Hands({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });
  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.5
  });
  hands.onResults(r=>{processHands(r);draw(r)});

  const camera=new Camera(vid,{
    onFrame:async()=>await hands.send({image:vid}),
    width:1280,height:720
  });
  await camera.start();

  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.style.display='none',700);
}

main().catch(err=>{
  document.getElementById('loadMsg').textContent='加载失败: '+err.message;
  console.error(err);
});

})();
</script>
</body>
</html>
