<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>掌心能量球 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
video{display:none}
#loading{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:#000;color:#6af;font-family:sans-serif;font-size:18px;
  transition:opacity .6s;
}
#loading.fade{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(100,170,255,.15);
  border-top-color:#6af;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#status{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(100,170,255,.5);font:12px monospace;z-index:5;pointer-events:none;
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span id="loadMsg">正在加载手部追踪模型…</span></div>
<canvas id="c"></canvas>
<video id="v" playsinline></video>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script>
(()=>{
'use strict';

const DPR=window.devicePixelRatio||1;

// ============ CONFIG ============
const SMOOTH       = 0.6;
const FORM_DIST    = 250*DPR;
const MIN_R        = 50*DPR;
const MAX_R        = 350*DPR;
const R_SCALE      = 0.7;
const HOLD_ABOVE   = 0.6;
const GRACE_MS     = 400;
const FADE_IN      = 0.035;
const FADE_OUT     = 0.012;

// Particle layers
const CORE_N   = 50;   // inner 25% — white hot
const MID_N    = 100;  // 25-70% — blue-white
const OUTER_N  = 60;   // 70-100% — blue, faint
const TOTAL_N  = CORE_N+MID_N+OUTER_N;

// ============ STATE ============
const S={IDLE:0,FORM:1,GROW:2,HOLD:3};
let state=S.IDLE;

let bx=0,by=0,br=MIN_R,bAlpha=0;
let tx=0,ty=0,tr=MIN_R;
let holdR=MIN_R;

// Smoothed hands
let sAnchor=null; // right hand (screen left) = anchor
let sControl=null; // left hand (screen right) = size control
let lastTwo=0;

// ============ PARTICLES ============
function makeParticle(layer){
  const rMin=layer===0?0:layer===1?0.25:0.7;
  const rMax=layer===0?0.25:layer===1?0.7:1.0;
  const rBand=rMin+Math.random()*(rMax-rMin);
  const szBase=layer===0?(2.5+Math.random()*3):layer===1?(3+Math.random()*4):(2+Math.random()*3);
  return{
    layer,
    rBand,
    th:Math.random()*Math.PI*2,
    ph:(Math.random()-0.5)*Math.PI,
    spd:(0.3+Math.random()*1.0)*(layer===0?1.5:layer===1?1.0:0.6),
    espd:0.15+Math.random()*0.35,
    sz:szBase*DPR,
    a:layer===0?(0.7+Math.random()*0.3):layer===1?(0.4+Math.random()*0.5):(0.15+Math.random()*0.35),
    ps:Math.random()*Math.PI*2,
    drift:Math.random()*0.3
  };
}

let pts=[];
function initParticles(){
  pts=[];
  for(let i=0;i<CORE_N;i++) pts.push(makeParticle(0));
  for(let i=0;i<MID_N;i++) pts.push(makeParticle(1));
  for(let i=0;i<OUTER_N;i++) pts.push(makeParticle(2));
}
initParticles();

// ============ CANVAS ============
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const vid=document.getElementById('v');
const statusEl=document.getElementById('status');

function resize(){
  canvas.width=window.innerWidth*DPR;
  canvas.height=window.innerHeight*DPR;
}
window.addEventListener('resize',resize);
resize();

function coverRect(vw,vh){
  const cw=canvas.width,ch=canvas.height;
  const va=vw/vh,ca=cw/ch;
  if(ca>va){const dw=cw,dh=cw/va;return{dx:0,dy:(ch-dh)/2,dw,dh}}
  const dh=ch,dw=ch*va;return{dx:(cw-dw)/2,dy:0,dw,dh}
}

function lm2c(lm,dr){
  return{x:dr.dx+dr.dw*(1-lm.x), y:dr.dy+dr.dh*lm.y}
}

function palm(lms,dr){
  const ids=[0,5,9,13,17];
  let sx=0,sy=0;
  for(const i of ids){const p=lm2c(lms[i],dr);sx+=p.x;sy+=p.y}
  return{x:sx/5,y:sy/5}
}

function sm(prev,cur,f){
  if(!prev)return{...cur};
  return{x:prev.x*f+cur.x*(1-f), y:prev.y*f+cur.y*(1-f)}
}

// ============ PROCESS ============
function processHands(results){
  const hands=results.multiHandLandmarks||[];
  if(!vid.videoWidth)return;
  const dr=coverRect(vid.videoWidth,vid.videoHeight);
  const now=performance.now();

  const names=['IDLE','FORM','GROW','HOLD'];
  statusEl.textContent=names[state]+' | hands:'+hands.length+' | r:'+Math.round(br/DPR);

  if(hands.length>=2){
    const p0=palm(hands[0],dr), p1=palm(hands[1],dr);
    // Screen-left = user's right hand = anchor
    const[anchor,control]=p0.x<p1.x?[p0,p1]:[p1,p0];

    sAnchor=sm(sAnchor,anchor,SMOOTH);
    sControl=sm(sControl,control,SMOOTH);
    lastTwo=now;

    const dist=Math.hypot(sControl.x-sAnchor.x,sControl.y-sAnchor.y);

    if(state===S.IDLE){
      if(dist<FORM_DIST){
        state=S.FORM;
        bx=sAnchor.x;by=sAnchor.y;br=MIN_R;
      }
    }

    if(state===S.FORM){
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
      tr=MIN_R;
      bAlpha=Math.min(1,bAlpha+FADE_IN);
      if(bAlpha>=0.9) state=S.GROW;
    }

    if(state===S.GROW||state===S.HOLD){
      state=S.GROW;
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
      tr=Math.max(MIN_R,Math.min(MAX_R,dist*R_SCALE));
      bAlpha=Math.min(1,bAlpha+FADE_IN);
    }

  }else if(hands.length===1){
    const p=palm(hands[0],dr);
    // This remaining hand is the anchor (right hand)
    sAnchor=sm(sAnchor,p,SMOOTH);

    if((state===S.GROW)&&(now-lastTwo)>GRACE_MS){
      holdR=br; // lock current size
      state=S.HOLD;
    }

    if(state===S.HOLD){
      tx=sAnchor.x;
      ty=sAnchor.y-holdR*HOLD_ABOVE;
      tr=holdR;
      bAlpha=1;
      // gentle breathing
      const breath=Math.sin(now/1000*2)*0.03;
      tr=holdR*(1+breath);
    }

    if(state===S.FORM){
      tx=sAnchor.x;
      ty=sAnchor.y-br*HOLD_ABOVE;
    }

  }else{
    if(state!==S.IDLE){
      bAlpha-=FADE_OUT;
      if(bAlpha<=0){bAlpha=0;state=S.IDLE;sAnchor=null;sControl=null;}
    }
  }

  const ps=0.5;
  bx=bx*ps+tx*(1-ps);
  by=by*ps+ty*(1-ps);
  br=br*0.8+tr*0.2;
}

// ============ DRAW ============
function draw(results){
  const cw=canvas.width,ch=canvas.height;
  ctx.clearRect(0,0,cw,ch);

  const img=results.image||vid;
  if(vid.videoWidth){
    const dr=coverRect(vid.videoWidth,vid.videoHeight);
    ctx.save();
    ctx.translate(cw,0);
    ctx.scale(-1,1);
    ctx.drawImage(img,dr.dx,dr.dy,dr.dw,dr.dh);
    ctx.restore();
  }

  if(state!==S.IDLE&&bAlpha>0.01){
    drawBall(performance.now()/1000);
  }
}

function drawBall(t){
  ctx.save();

  // Sort particles by depth for back-to-front rendering
  const sorted=pts.map(p=>{
    const theta=p.th+t*p.spd;
    const phi=p.ph+Math.sin(t*p.espd+p.ps)*0.35+Math.sin(t*0.3+p.ps*2)*p.drift;
    const ct=Math.cos(theta),st=Math.sin(theta);
    const cp=Math.cos(phi),sp=Math.sin(phi);
    const depth=ct*cp;
    const r=br*p.rBand*(0.85+0.15*Math.sin(t*0.8+p.ps));
    const px=bx+ct*cp*r;
    const py=by+sp*r*0.7+st*cp*r*0.3;
    return{...p,px,py,depth,theta,phi};
  }).sort((a,b)=>a.depth-b.depth);

  for(const p of sorted){
    const depthFactor=0.3+0.7*Math.max(0,(p.depth+1)/2);
    const alpha=p.a*depthFactor*bAlpha;
    if(alpha<0.015)continue;

    const sizeMul=0.5+0.5*depthFactor;
    const sz=p.sz*sizeMul*(br/MIN_R*0.3+0.7);
    const finalSz=Math.max(1,Math.min(sz,12*DPR));

    // Color by layer
    let r,g,b;
    if(p.layer===0){
      // Core: white to light blue
      const w=0.7+0.3*depthFactor;
      r=Math.round(200+55*w);
      g=Math.round(220+35*w);
      b=255;
    }else if(p.layer===1){
      // Mid: blue-white
      r=Math.round(80+100*depthFactor);
      g=Math.round(150+80*depthFactor);
      b=255;
    }else{
      // Outer: deep blue
      r=Math.round(30+60*depthFactor);
      g=Math.round(80+80*depthFactor);
      b=Math.round(200+55*depthFactor);
    }

    ctx.globalAlpha=alpha;
    ctx.shadowColor=`rgba(${r},${g},${b},${Math.min(1,alpha*1.5)})`;
    ctx.shadowBlur=finalSz*(p.layer===0?4:p.layer===1?3:2);
    ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath();
    ctx.arc(p.px,p.py,finalSz,0,Math.PI*2);
    ctx.fill();
  }

  ctx.shadowBlur=0;

  // Energy arcs between hands during GROW
  if(state===S.GROW&&sAnchor&&sControl){
    ctx.lineWidth=2*DPR;
    for(let i=0;i<4;i++){
      const w=Math.sin(t*3.5+i*1.7)*18*DPR;
      const a=bAlpha*0.15;
      ctx.globalAlpha=a;
      ctx.strokeStyle=`rgba(120,190,255,${a})`;
      ctx.shadowColor='rgba(100,180,255,0.2)';
      ctx.shadowBlur=6*DPR;
      ctx.beginPath();
      ctx.moveTo(sAnchor.x,sAnchor.y);
      ctx.quadraticCurveTo((sAnchor.x+sControl.x)/2,
        (sAnchor.y+sControl.y)/2+w,
        sControl.x,sControl.y);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  }

  ctx.restore();
}

// ============ INIT ============
async function main(){
  const hands=new Hands({
    locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });
  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.5
  });
  hands.onResults(r=>{processHands(r);draw(r)});

  const camera=new Camera(vid,{
    onFrame:async()=>await hands.send({image:vid}),
    width:1280,height:720
  });
  await camera.start();

  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.style.display='none',700);
}

main().catch(err=>{
  document.getElementById('loadMsg').textContent='加载失败: '+err.message;
  console.error(err);
});

})();
</script>
</body>
</html>
