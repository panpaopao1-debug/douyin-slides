<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>掌心能量球 v4 — Three.js</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#webcam{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);z-index:0;
}
#scene{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:1;
}
#loading{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;background:#000;color:#6af;font-family:sans-serif;font-size:18px;
  transition:opacity .6s;
}
#loading.fade{opacity:0;pointer-events:none}
.spinner{
  width:40px;height:40px;
  border:3px solid rgba(100,170,255,.15);
  border-top-color:#6af;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#status{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:rgba(100,170,255,.5);font:12px monospace;z-index:5;pointer-events:none;
}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span id="loadMsg">正在加载手部追踪模型…</span></div>
<video id="webcam" autoplay playsinline></video>
<canvas id="scene"></canvas>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script>
(()=>{
'use strict';

// ============ CONFIG ============
const PARTICLE_COUNT = 3000;
const SPHERE_RADIUS  = 200;
const SPRING         = 0.03;
const DAMPING        = 0.92;
const INTERACTION_R  = 500;
const FORCE_POWER    = 15;

// ============ THREE.JS GLOBALS ============
let scene, camera, renderer;
let particleGeometry, particleMaterial, particleSystem;
const particlePositions = [];
const particleVelocities = [];
const particleColors = [];

let colorHue = 220;
let targetColorHue = 220;
let targetExpansion = 1.0;
let currentExpansion = 1.0;
let time = 0;

// ============ HAND TRACKING GLOBALS ============
const videoEl = document.getElementById('webcam');
const statusEl = document.getElementById('status');

let gestureData = {
  handDetected: false,
  handCount: 0,
  handDistance: 0,
  handOpenness: 0,
  palmCenter: {x:0, y:0, z:0}
};
let previousPalmCenter = null;
let handVelocity = {x:0, y:0, z:0};

// ============ THREE.JS SETUP ============
function initThreeJS(){
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    75, window.innerWidth/window.innerHeight, 0.1, 1000
  );
  camera.position.z = 400;

  renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('scene'),
    antialias: true,
    alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  createParticleSystem();

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function createParticleSystem(){
  particleGeometry = new THREE.BufferGeometry();

  const positions = new Float32Array(PARTICLE_COUNT*3);
  const colors = new Float32Array(PARTICLE_COUNT*3);
  const sizes = new Float32Array(PARTICLE_COUNT);

  for(let i=0; i<PARTICLE_COUNT; i++){
    const radius = Math.random()*SPHERE_RADIUS + 50;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI;

    positions[i*3]   = radius*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = radius*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = radius*Math.cos(phi);

    particlePositions.push({
      x: positions[i*3],
      y: positions[i*3+1],
      z: positions[i*3+2]
    });
    particleVelocities.push({x:0, y:0, z:0});

    const color = new THREE.Color();
    color.setHSL(colorHue/360, 0.8, 0.6);
    colors[i*3]   = color.r;
    colors[i*3+1] = color.g;
    colors[i*3+2] = color.b;

    particleColors.push({h:colorHue, s:0.8, l:0.6});
    sizes[i] = Math.random()*2 + 1;
  }

  particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
  particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors,3));
  particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes,1));

  particleMaterial = new THREE.PointsMaterial({
    size: 3,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.8,
    sizeAttenuation: true
  });

  particleSystem = new THREE.Points(particleGeometry, particleMaterial);
  scene.add(particleSystem);
}

// ============ COORDINATE MAPPING ============
// Map MediaPipe normalized [0,1] coords to Three.js world coords
// Webcam is mirrored (CSS scaleX(-1)), so we flip x
function landmarkToWorld(lx, ly, lz){
  const fov = camera.fov * Math.PI/180;
  const visH = 2*camera.position.z*Math.tan(fov/2);
  const visW = visH*camera.aspect;
  return {
    x: (0.5 - lx)*visW,
    y: -(ly - 0.5)*visH,
    z: (lz||0)*500
  };
}

// ============ HAND TRACKING ============
function processGestures(handsData){
  if(handsData.length === 1){
    const hand = handsData[0];
    const palmX = (hand[0].x+hand[5].x+hand[9].x+hand[13].x+hand[17].x)/5;
    const palmY = (hand[0].y+hand[5].y+hand[9].y+hand[13].y+hand[17].y)/5;
    const palmZ = (hand[0].z+hand[5].z+hand[9].z+hand[13].z+hand[17].z)/5;

    gestureData.palmCenter = landmarkToWorld(palmX, palmY, palmZ);

    const thumbTip = hand[4];
    const pinkyTip = hand[20];
    gestureData.handOpenness = Math.sqrt(
      (thumbTip.x-pinkyTip.x)**2 + (thumbTip.y-pinkyTip.y)**2
    );

    targetColorHue = 180 + gestureData.handOpenness*300;

  } else if(handsData.length >= 2){
    const hand1 = handsData[0];
    const hand2 = handsData[1];

    const p1x = (hand1[0].x+hand1[9].x)/2;
    const p1y = (hand1[0].y+hand1[9].y)/2;
    const p2x = (hand2[0].x+hand2[9].x)/2;
    const p2y = (hand2[0].y+hand2[9].y)/2;

    const handDist = Math.sqrt((p1x-p2x)**2 + (p1y-p2y)**2);
    gestureData.handDistance = handDist;

    targetExpansion = 0.5 + handDist*5;
    targetExpansion = Math.max(0.3, Math.min(3.0, targetExpansion));

    // Palm center = midpoint of two hands
    const mx = (p1x+p2x)/2;
    const my = (p1y+p2y)/2;
    gestureData.palmCenter = landmarkToWorld(mx, my, 0);
  }
}

function onHandResults(results){
  const hands = results.multiHandLandmarks || [];

  if(hands.length > 0){
    gestureData.handDetected = true;
    gestureData.handCount = hands.length;
    processGestures(hands);
  } else {
    gestureData.handDetected = false;
    gestureData.handCount = 0;
  }

  statusEl.textContent = 'hands:'+hands.length+' | exp:'+currentExpansion.toFixed(2)+' | hue:'+Math.round(colorHue);
}

// ============ PARTICLE UPDATE ============
function updateParticles(){
  const positions = particleGeometry.attributes.position.array;
  const colors = particleGeometry.attributes.color.array;

  for(let i=0; i<PARTICLE_COUNT; i++){
    const idx = i*3;
    const orig = particlePositions[i];

    // Organic idle breathing
    const noiseX = Math.sin(time + orig.y*0.01)*20;
    const noiseY = Math.cos(time*0.8 + orig.x*0.01)*20;
    const noiseZ = Math.sin(time*0.5 + orig.z*0.01)*20;

    const homeX = orig.x*currentExpansion + noiseX;
    const homeY = orig.y*currentExpansion + noiseY;
    const homeZ = orig.z*currentExpansion + noiseZ;

    // Hand interaction
    if(gestureData.handDetected){
      const dx = gestureData.palmCenter.x - positions[idx];
      const dy = gestureData.palmCenter.y - positions[idx+1];
      const dz = gestureData.palmCenter.z - positions[idx+2];
      const distSq = dx*dx + dy*dy + dz*dz;
      const distance = Math.sqrt(distSq);

      if(distance < INTERACTION_R){
        const t = (INTERACTION_R - distance)/INTERACTION_R;
        const force = t*t*t;

        const attractDir = gestureData.handOpenness > 0.15 ? -1 : 1;

        particleVelocities[i].x += (dx/distance)*force*attractDir*FORCE_POWER;
        particleVelocities[i].y += (dy/distance)*force*attractDir*FORCE_POWER;
        particleVelocities[i].z += (dz/distance)*force*attractDir*FORCE_POWER;

        if(Math.abs(handVelocity.x) > 0.1 || Math.abs(handVelocity.y) > 0.1){
          const drag = 0.3*force;
          particleVelocities[i].x += handVelocity.x*drag;
          particleVelocities[i].y += handVelocity.y*drag;
          particleVelocities[i].z += handVelocity.z*drag;
        }
      }
    }

    // Apply velocity
    positions[idx]   += particleVelocities[i].x;
    positions[idx+1] += particleVelocities[i].y;
    positions[idx+2] += particleVelocities[i].z;

    // Spring back home
    particleVelocities[i].x += (homeX - positions[idx])*SPRING;
    particleVelocities[i].y += (homeY - positions[idx+1])*SPRING;
    particleVelocities[i].z += (homeZ - positions[idx+2])*SPRING;

    // Damping
    particleVelocities[i].x *= DAMPING;
    particleVelocities[i].y *= DAMPING;
    particleVelocities[i].z *= DAMPING;

    // Update colors
    particleColors[i].h += (colorHue - particleColors[i].h)*0.02;
    const color = new THREE.Color();
    const speed = Math.sqrt(
      particleVelocities[i].x**2 +
      particleVelocities[i].y**2 +
      particleVelocities[i].z**2
    );
    const lightness = 0.5 + Math.min(0.5, speed*0.02);
    color.setHSL(particleColors[i].h/360, 0.8, lightness);
    colors[idx]   = color.r;
    colors[idx+1] = color.g;
    colors[idx+2] = color.b;
  }

  particleGeometry.attributes.position.needsUpdate = true;
  particleGeometry.attributes.color.needsUpdate = true;
}

// ============ ANIMATION LOOP ============
function animate(){
  requestAnimationFrame(animate);
  time += 0.01;

  // Smooth interpolation
  currentExpansion += (targetExpansion - currentExpansion)*0.05;
  colorHue += (targetColorHue - colorHue)*0.02;

  // Hand velocity tracking
  if(gestureData.handDetected && gestureData.palmCenter){
    if(previousPalmCenter){
      handVelocity = {
        x: gestureData.palmCenter.x - previousPalmCenter.x,
        y: gestureData.palmCenter.y - previousPalmCenter.y,
        z: gestureData.palmCenter.z - previousPalmCenter.z
      };
    }
    previousPalmCenter = {...gestureData.palmCenter};
  } else {
    previousPalmCenter = null;
    handVelocity = {x:0, y:0, z:0};
  }

  updateParticles();

  // Slow rotation
  particleSystem.rotation.y += 0.002;

  renderer.render(scene, camera);
}

// ============ INIT ============
async function main(){
  initThreeJS();

  const mpHands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });
  mpHands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
  });
  mpHands.onResults(onHandResults);

  const cam = new Camera(videoEl, {
    onFrame: async()=> await mpHands.send({image: videoEl}),
    width: 1280,
    height: 720
  });
  await cam.start();

  animate();

  const ld = document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=> ld.style.display='none', 700);
}

main().catch(err=>{
  document.getElementById('loadMsg').textContent='加载失败: '+err.message;
  console.error(err);
});

})();
</script>
</body>
</html>
